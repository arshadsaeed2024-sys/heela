<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply to be a Fellow — Heela</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --green-900: #1B3D2F; --green-800: #234E3B; --green-700: #2B5A45;
  --green-600: #366B53; --green-500: #3E7A5E; --green-300: #7BAF96;
  --green-200: #A8CDB8; --green-100: #D4E8DC; --green-50: #EBF3EE;
  --warm-800: #4a3f36; --warm-200: #ece6dd; --warm-100: #F3EFE8; --warm-50: #F7F4EF;
  --white: #FFFCF7; --text-primary: #1a1a1a; --text-secondary: #5a5a5a; --text-muted: #8a8a8a;
}
html { scroll-behavior: smooth; }
body { font-family: 'Outfit', sans-serif; background: var(--warm-50); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

nav { padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; background: rgba(247,244,239,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.06); position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--green-800); text-decoration: none; }
.nav-link { font-size: 0.9rem; color: var(--text-secondary); text-decoration: none; }
.nav-link:hover { color: var(--green-700); }

main { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 7rem 1.5rem 4rem; }

.card { background: var(--white); border-radius: 20px; border: 1px solid rgba(0,0,0,0.06); padding: 3rem 2.5rem; width: 100%; max-width: 540px; box-shadow: 0 4px 40px rgba(0,0,0,0.06); }

.tag { display: inline-block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warm-800); margin-bottom: 1rem; padding: 0.35rem 0.9rem; background: var(--warm-200); border-radius: 100px; }
h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--green-900); margin-bottom: 0.4rem; letter-spacing: -0.02em; }
.sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem; }
.sub a { color: var(--green-700); text-decoration: none; font-weight: 500; }
.sub a:hover { text-decoration: underline; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
label { font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); }
input, select, textarea {
  width: 100%; padding: 0.85rem 1rem; border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.1); background: var(--warm-50);
  color: var(--text-primary); font-family: 'Outfit', sans-serif;
  font-size: 0.9rem; outline: none;
  transition: border-color 0.2s, background 0.2s; -webkit-appearance: none;
}
input::placeholder, textarea::placeholder { color: var(--text-muted); }
input:focus, select:focus, textarea:focus { border-color: var(--green-500); background: var(--white); }
textarea { resize: none; line-height: 1.6; }
select { cursor: pointer; }

.error-msg { display: none; font-size: 0.875rem; color: #c0392b; background: #fef0ec; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; }

.btn { width: 100%; padding: 1rem; background: var(--green-800); color: var(--white); border: none; border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 0.5rem; }
.btn:hover { background: var(--green-700); transform: translateY(-2px); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.note { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 1rem; line-height: 1.6; }

.success-state { text-align: center; padding: 1rem 0; }
.success-icon { width: 64px; height: 64px; background: var(--green-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
.success-title { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--green-900); margin-bottom: 0.5rem; }
.success-sub { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 2rem; max-width: 340px; margin-left: auto; margin-right: auto; }
.success-link { color: var(--green-700); font-weight: 500; text-decoration: none; font-size: 0.95rem; }
.success-link:hover { text-decoration: underline; }

@media (max-width: 560px) { .card { padding: 2rem 1.5rem; } .form-row { grid-template-columns: 1fr; } h1 { font-size: 1.7rem; } }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Heela</a>
  <a href="/login.html" class="nav-link">Sign in</a>
</nav>

<main>
  <div class="card" id="signup-card">
    <div class="tag">For Fellows</div>
    <h1>Become a Fellow</h1>
    <p class="sub">Apply to mentor refugee students through the college application process.</p>

    <form id="signup-form" autocomplete="on">
      <div class="form-row">
        <div class="form-group">
          <label for="first-name">First name</label>
          <input type="text" id="first-name" placeholder="First name" autocomplete="given-name" required>
        </div>
        <div class="form-group">
          <label for="last-name">Last name</label>
          <input type="text" id="last-name" placeholder="Last name" autocomplete="family-name" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@university.edu" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="university">University</label>
        <input type="text" id="university" placeholder="e.g. University of Utah" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="year">Year in school</label>
          <select id="year" required>
            <option value="" disabled selected>Select year</option>
            <option value="freshman">Freshman</option>
            <option value="sophomore">Sophomore</option>
            <option value="junior">Junior</option>
            <option value="senior">Senior</option>
            <option value="graduate">Graduate student</option>
          </select>
        </div>
        <div class="form-group">
          <label for="major">Major</label>
          <input type="text" id="major" placeholder="e.g. Education">
        </div>
      </div>
      <div class="form-group">
        <label for="bio">Why do you want to be a Fellow? <span style="color:var(--text-muted);font-weight:400;">(2–3 sentences)</span></label>
        <textarea id="bio" rows="3" placeholder="Tell us a bit about yourself and why this matters to you..." required></textarea>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button type="button" class="btn" id="signup-btn" onclick="handleApply()">Submit application &rarr;</button>
      <p class="note">Applications are reviewed by the Heela team. If selected, you'll receive an email to create your account.</p>
    </form>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://ffoarsbuqrlbpkvaxvha.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_l7lnXsEMcrB0whXR6GCbIw_M4bwwCpe';

async function handleApply() {
  const firstName  = document.getElementById('first-name').value.trim();
  const lastName   = document.getElementById('last-name').value.trim();
  const email      = document.getElementById('email').value.trim();
  const university = document.getElementById('university').value.trim();
  const year       = document.getElementById('year').value;
  const major      = document.getElementById('major').value.trim();
  const bio        = document.getElementById('bio').value.trim();

  hideError();

  if (!firstName || !lastName || !email || !university || !year || !bio) {
    return showError('Please fill in all required fields.');
  }

  const btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fellow_applications`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ first_name: firstName, last_name: lastName, email, university, year, major, bio })
    });

    if (!res.ok) {
      const err = await res.json();
      btn.disabled = false;
      btn.textContent = 'Submit application →';
      return showError(err.message || 'Something went wrong. Please try again.');
    }

    document.getElementById('signup-card').innerHTML = `
      <div class="success-state">
        <div class="success-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M5 14l6 6L23 8" stroke="#2B5A45" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="success-title">Application received.</p>
        <p class="success-sub">Thank you, ${firstName}. The Heela team will review your application and reach out within a few days.</p>
        <a href="/" class="success-link">← Back to Heela</a>
      </div>
    `;
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Submit application →';
    showError('Connection error. Please check your internet and try again.');
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  const el = document.getElementById('error-msg');
  if (el) el.style.display = 'none';
}
</script>
</body>
</html>
