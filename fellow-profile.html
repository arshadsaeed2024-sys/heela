<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Heela Fellow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --green-900: #1B3D2F; --green-800: #234E3B; --green-700: #2B5A45;
  --green-600: #366B53; --green-500: #3E7A5E; --green-400: #5A9A7A;
  --green-300: #7BAF96; --green-200: #A8CDB8; --green-100: #D4E8DC; --green-50: #EBF3EE;
  --warm-800: #4a3f36; --warm-200: #ece6dd; --warm-100: #F3EFE8; --warm-50: #F7F4EF;
  --white: #FFFCF7; --text-primary: #1a1a1a; --text-secondary: #5a5a5a; --text-muted: #8a8a8a;
  --sidebar-w: 240px;
}
html { scroll-behavior: smooth; }
body { font-family: 'Outfit', sans-serif; background: var(--warm-50); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.app { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--green-900); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; padding: 1.5rem 1rem; }
.sidebar-logo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--green-100); text-decoration: none; padding: 0.5rem 0.75rem; margin-bottom: 0.5rem; display: block; }
.sidebar-logo span { font-size: 0.75rem; font-family: 'Outfit', sans-serif; display: block; color: var(--green-400); letter-spacing: 0.05em; font-weight: 400; margin-top: 0.1rem; }
.fellow-badge { margin: 0 0.75rem 1.5rem; padding: 0.4rem 0.75rem; background: rgba(255,255,255,0.08); border-radius: 8px; font-size: 0.78rem; color: rgba(255,255,255,0.5); }
.nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 10px; text-decoration: none; color: rgba(255,255,255,0.6); font-size: 0.9rem; font-weight: 400; transition: all 0.2s; margin-bottom: 0.25rem; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
.nav-item.active { background: rgba(255,255,255,0.12); color: var(--white); }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.sidebar-bottom { margin-top: auto; }
.sign-out { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 10px; color: rgba(255,255,255,0.4); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; background: none; border: none; font-family: 'Outfit', sans-serif; width: 100%; }
.sign-out:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }

/* MAIN */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 2.5rem; max-width: 700px; }

.page-header { margin-bottom: 2rem; }
.page-title { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--green-900); margin-bottom: 0.25rem; }
.page-sub { font-size: 0.95rem; color: var(--text-muted); }

/* AVATAR */
.avatar-section { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; }
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--green-200); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--green-800); overflow: hidden; cursor: pointer; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar-overlay { position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; cursor: pointer; }
.avatar-wrap:hover .avatar-overlay { opacity: 1; }
.avatar-overlay svg { color: white; }
.avatar-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem; text-align: center; }
.avatar-info {}
.avatar-name { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--green-900); }
.avatar-email { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.2rem; }
#avatar-input { display: none; }

/* CARD */
.card { background: var(--white); border-radius: 16px; border: 1px solid rgba(0,0,0,0.06); padding: 2rem; margin-bottom: 1.25rem; }
.card-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.25rem; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.field-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.field-group:last-child { margin-bottom: 0; }
label { font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); }
input, select, textarea {
  width: 100%; padding: 0.85rem 1rem; border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.1); background: var(--warm-50);
  color: var(--text-primary); font-family: 'Outfit', sans-serif;
  font-size: 0.9rem; outline: none; transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
textarea { resize: vertical; line-height: 1.6; }
input:focus, select:focus, textarea:focus { border-color: var(--green-500); background: var(--white); }
input[readonly] { opacity: 0.6; cursor: not-allowed; }

.btn-save { padding: 0.85rem 2rem; background: var(--green-800); color: var(--white); border: none; border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
.btn-save:hover { background: var(--green-700); }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

.success-msg { display: none; font-size: 0.875rem; color: var(--green-700); background: var(--green-50); border-radius: 8px; padding: 0.75rem 1rem; margin-top: 1rem; }
.error-msg { display: none; font-size: 0.875rem; color: #c0392b; background: #fef0ec; border-radius: 8px; padding: 0.75rem 1rem; margin-top: 1rem; }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--green-100); border-top-color: var(--green-600); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* MOBILE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 1.25rem; padding-bottom: 5rem; }
  .field-row { grid-template-columns: 1fr; }
  .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--green-900); z-index: 50; padding: 0.75rem 0 calc(0.75rem + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.08); }
  .mobile-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.25rem; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.65rem; }
  .mobile-nav a.active { color: var(--white); }
  .mobile-nav svg { width: 20px; height: 20px; }
  .page-title { font-size: 1.5rem; }
}
@media (min-width: 769px) { .mobile-nav { display: none; } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a href="/" class="sidebar-logo">Heela <span>Fellow Portal</span></a>
    <div class="fellow-badge" id="fellow-name-badge">Fellow</div>
    <a href="/fellow-dashboard.html" class="nav-item">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M2 20c0-3.3 3.1-6 7-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="17" cy="15" r="4" stroke="currentColor" stroke-width="1.8"/></svg>
      My Students
    </a>
    <a href="/fellow-profile.html" class="nav-item active">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      My Profile
    </a>
    <div class="sidebar-bottom">
      <button class="sign-out" onclick="signOut()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div id="content" style="display:none;">
      <div class="page-header">
        <h1 class="page-title">My Profile</h1>
        <p class="page-sub">Update your information visible to your students.</p>
      </div>

      <div class="avatar-section">
        <div class="avatar-wrap" onclick="document.getElementById('avatar-input').click()">
          <div class="avatar" id="avatar"></div>
          <div class="avatar-overlay">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" onchange="uploadAvatar(this)">
        <div class="avatar-info">
          <div class="avatar-name" id="avatar-name"></div>
          <div class="avatar-email" id="avatar-email"></div>
          <div class="avatar-hint">Click photo to change</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Personal information</div>
        <div class="field-row">
          <div class="field-group">
            <label for="first-name">First name</label>
            <input type="text" id="first-name" placeholder="First name">
          </div>
          <div class="field-group">
            <label for="last-name">Last name</label>
            <input type="text" id="last-name" placeholder="Last name">
          </div>
        </div>
        <div class="field-group">
          <label for="university">University</label>
          <input type="text" id="university" placeholder="e.g. University of Utah">
        </div>
        <div class="field-group">
          <label for="email">Email</label>
          <input type="email" id="email" readonly>
        </div>
        <div class="field-group">
          <label for="bio">Bio <span style="font-weight:400;color:var(--text-muted);">(shown to your students)</span></label>
          <textarea id="bio" rows="4" placeholder="Tell your students a bit about yourself — where you're from, what you study, why you joined Heela..."></textarea>
        </div>
        <div class="success-msg" id="success-msg">Profile updated successfully.</div>
        <div class="error-msg" id="error-msg"></div>
        <button class="btn-save" id="save-btn" onclick="saveProfile()">Save changes</button>
      </div>
    </div>
  </main>

  <nav class="mobile-nav">
    <a href="/fellow-dashboard.html">
      <svg fill="none" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M2 20c0-3.3 3.1-6 7-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="17" cy="15" r="4" stroke="currentColor" stroke-width="1.8"/></svg>
      Students
    </a>
    <a href="/fellow-profile.html" class="active">
      <svg fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Profile
    </a>
  </nav>
</div>

<script>
const SUPABASE_URL = 'https://ffoarsbuqrlbpkvaxvha.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_l7lnXsEMcrB0whXR6GCbIw_M4bwwCpe';

const session = JSON.parse(localStorage.getItem('heela_session') || 'null');
if (!session) { window.location.href = '/login.html'; }

let fellowId = null;

async function init() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fellows?auth_id=eq.${session.user.id}&select=*`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
    });
    const data = await res.json();

    if (!data || data.length === 0) {
      document.getElementById('loading').innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted);">Profile not found. <a href="#" onclick="signOut();return false;" style="color:var(--green-700);">Sign out</a></div>`;
      return;
    }

    const f = data[0];
    fellowId = f.id;

    document.getElementById('fellow-name-badge').textContent = `${f.first_name} ${f.last_name}`;
    renderAvatar(f);
    document.getElementById('avatar-name').textContent = `${f.first_name} ${f.last_name}`;
    document.getElementById('avatar-email').textContent = f.email;
    document.getElementById('first-name').value = f.first_name || '';
    document.getElementById('last-name').value = f.last_name || '';
    document.getElementById('university').value = f.university || '';
    document.getElementById('email').value = f.email || '';
    document.getElementById('bio').value = f.bio || '';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (err) {
    document.getElementById('loading').innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted);">Something went wrong. <a href="#" onclick="signOut();return false;" style="color:var(--green-700);">Sign out</a></div>`;
  }
}

async function saveProfile() {
  const btn = document.getElementById('save-btn');
  const successEl = document.getElementById('success-msg');
  const errorEl = document.getElementById('error-msg');
  successEl.style.display = 'none';
  errorEl.style.display = 'none';

  const firstName  = document.getElementById('first-name').value.trim();
  const lastName   = document.getElementById('last-name').value.trim();
  const university = document.getElementById('university').value.trim();
  const bio        = document.getElementById('bio').value.trim();

  if (!firstName || !lastName) {
    errorEl.textContent = 'First and last name are required.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  const res = await fetch(`${SUPABASE_URL}/rest/v1/fellows?id=eq.${fellowId}`, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ first_name: firstName, last_name: lastName, university, bio })
  });

  btn.disabled = false;
  btn.textContent = 'Save changes';

  if (res.ok) {
    document.getElementById('avatar-name').textContent = `${firstName} ${lastName}`;
    document.getElementById('fellow-name-badge').textContent = `${firstName} ${lastName}`;
    const avatarEl = document.getElementById('avatar');
    if (!avatarEl.querySelector('img')) avatarEl.textContent = (firstName[0] + lastName[0]).toUpperCase();
    successEl.style.display = 'block';
    setTimeout(() => successEl.style.display = 'none', 3000);
  } else {
    errorEl.textContent = 'Something went wrong. Please try again.';
    errorEl.style.display = 'block';
  }
}

function renderAvatar(f) {
  const initials = ((f.first_name?.[0] || '') + (f.last_name?.[0] || '')).toUpperCase();
  const avatarEl = document.getElementById('avatar');
  if (f.avatar_url) {
    avatarEl.innerHTML = `<img src="${f.avatar_url}" alt="Avatar">`;
  } else {
    avatarEl.textContent = initials;
  }
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    alert('Photo must be under 5MB.');
    return;
  }

  const ext = file.name.split('.').pop();
  const path = `fellow_${session.user.id}.${ext}`;

  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/avatars/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      'Content-Type': file.type,
      'x-upsert': 'true'
    },
    body: file
  });

  if (!uploadRes.ok) {
    alert('Upload failed. Please try again.');
    return;
  }

  const avatarUrl = `${SUPABASE_URL}/storage/v1/object/public/avatars/${path}`;

  await fetch(`${SUPABASE_URL}/rest/v1/fellows?id=eq.${fellowId}`, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ avatar_url: avatarUrl })
  });

  document.getElementById('avatar').innerHTML = `<img src="${avatarUrl}?t=${Date.now()}" alt="Avatar">`;
}

function signOut() {
  localStorage.removeItem('heela_session');
  window.location.href = '/login.html';
}

init();
</script>
</body>
</html>
